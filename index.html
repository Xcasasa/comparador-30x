var cur=0;
var BL=[...new Set(SL.map(function(s){return s.bl;}))];

function lbl(st){
  if(st==='same') return ['Sin cambios','bs'];
  if(st==='modified') return ['Modificado','bm'];
  if(st==='new') return ['Nuevo','bn'];
  return ['Eliminado','bs'];
}
function g(id){return document.getElementById(id);}
function mkImg(src){
  if(!src) return '<div class="emp-img">Imagen no disponible</div>';
  return '<img src="'+src+'" alt="" loading="lazy">';
}

function render(){
  var s=SL[cur], l=lbl(s.st);
  g('ctr').textContent=(cur+1)+' / '+SL.length;
  g('pill').textContent=s.bl;
  g('bdg').textContent=l[0]; g('bdg').className='bdg '+l[1];
  g('pf').style.width=((cur+1)/SL.length*100)+'%';
  g('bP').disabled=(cur===0); g('bN').disabled=(cur===SL.length-1);

  // Block nav
  var bh='';
  for(var i=0;i<BL.length;i++){
    bh+='<button class="bb'+(BL[i]===s.bl?' on':'')+'" onclick="jb('+i+')">'+BL[i]+'</button>';
  }
  g('bks').innerHTML=bh;

  // ORIGINAL panel
  if(s.og){
    g('oN').textContent='Slide '+s.og.n;
    g('oI').innerHTML=mkImg(s.og.i);
    g('oInfo').innerHTML=
      '<div class="slide-title-orig">'+s.og.t+'</div>'+
      '<div class="slide-desc-orig">'+s.og.d+'</div>';
  } else {
    g('oN').textContent='';
    g('oI').innerHTML='<div class="emp-img">No existe en la presentación original.<br>Este slide es completamente nuevo.</div>';
    g('oInfo').innerHTML='';
  }

  // NUEVA panel
  g('nN').textContent='Slide '+s.nv.n;
  g('nI').innerHTML=mkImg(s.nv.i);
  g('nInfo').innerHTML=
    '<div class="slide-title-nv">'+s.nv.t+'</div>'+
    '<div class="sec-label">¿Qué propongo?</div>'+
    '<div class="propuesta-box"><div class="propuesta-text">'+s.nv.propuesta+'</div></div>'+
    '<div class="sec-label">La narrativa · Lo que dice Andrés</div>'+
    '<div class="narrativa-box"><div class="narrativa-text">'+s.nv.narrativa+'</div></div>';
}

function go(d){cur=Math.max(0,Math.min(SL.length-1,cur+d));render();}
function jb(i){cur=SL.findIndex(function(s){return s.bl===BL[i];});render();}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft')go(-1);
  if(e.key==='ArrowRight')go(1);
});
render();
</script>
