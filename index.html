<style>
*{box-sizing:border-box;margin:0;padding:0}

.modal-close:hover{color:#fff}
.modal-side{position:fixed;font-size:28px;color:#333;cursor:pointer;background:none;border:none;top:50%;transform:translateY(-50%);padding:20px}
.modal-side:hover{color:#888}
#mPrev{left:10px}
#mNext{right:10px}

<script>
var scriptVisible = true;
var modalSide = 'nueva';

var SL=[
{bl:"Apertura",st:"new",
 nv:{n:"0",t:"Momento Cero",i:"imgs/n01.jpg",
   propuesta:"Una sola pregunta en pantalla negra, sin logos ni agenda: '¿Qué tendría que pasar en los próximos tres días para que esto valga absolutamente todo lo que invertiste en estar aquí?' La audiencia la lee mientras la sala se llena. Andrés no entra hasta que lleva al menos 3 minutos en pantalla.",
   script:"[Instrucción para el productor] Esta pregunta aparece cuando los asistentes entran al salón. No hay música, no hay animación, no hay agenda del día. Solo esta pregunta en pantalla. Los founders la leen, la piensan, algunos la escriben. Andrés entra cuando la sala está llena y la pregunta lleva al menos 3 minutos en pantalla."},
 og:null},

{bl:"Apertura",st:"same",
 nv:{n:"1",t:"Portada",i:"imgs/n02.jpg",
   propuesta:"Nombre y credencial mínima en fondo negro. Andrés entra al salón, va al frente, escanea la sala en silencio durante cinco segundos. No saluda todavía.",
   script:"'Antes de arrancar — ¿alguien quiere compartir lo que escribió?'\n\nTres o cuatro personas comparten. Andrés no comenta, no evalúa, solo asiente. Escucha los dolores reales que va a referenciar durante la presentación.\n\nDespués de la última persona:\n\n'Gracias. Voy a estar pensando en lo que acaban de compartir durante todo el día.'"},
 og:{n:"1",t:"Portada",d:"Andrés Bilbao · Co-founder Rappi · Co-founder B2 · Serial entrepreneur",i:"imgs/o01.jpg"}},

{bl:"Apertura",st:"new",
 nv:{n:"A1",t:"La Credencial",i:"imgs/n03.jpg",
   propuesta:"'50% en la primera levanta. Sin cohorte. Sin churn. 15 personas.' — La historia de los inicios de Rappi como slide propio, no en notas.",
   script:"'Cuando empezamos Rappi, entregamos el cincuenta por ciento de la compañía en la primera levanta de capital.'\n\n'No sabíamos qué era un cohorte. No sabíamos que había que medir churn. No sabíamos cómo construir micro-servicios. La empresa más grande que alguno de nosotros había operado tenía quince personas.'\n\n'En papel — en cualquier análisis, en cualquier modelo financiero — no teníamos ninguna razón para triunfar.'\n\n[Pausa. Camina un paso hacia la audiencia.]\n\n'Y sin embargo, escalamos a nueve países.'\n\n[Silencio de tres segundos.]\n\n'La pregunta que me hice durante años — y que hoy les voy a compartir — es: ¿por qué funcionó?'"},
 og:{n:"—",t:"Solo en notas del slide 3",d:"La historia de los inicios de Rappi estaba únicamente en las notas del speaker, invisible para la audiencia.",i:null}},

{bl:"Apertura",st:"new",
 nv:{n:"A2",t:"El Desafío Compartido",i:"imgs/n04.jpg",
   propuesta:"'Lo que los trajo hasta aquí no los va a llevar a donde quieren ir.' — Una sola afirmación en pantalla grande.",
   script:"'Ustedes están aquí porque quieren llevar su empresa a una nueva escala. Quieren construir algo que trascienda, algo que compita en el mundo, no solo en su mercado local. Algo world class.'\n\n[Pausa.]\n\n'Y si son honestos — y les pido que sean muy honestos durante estos tres días — también están aquí porque saben que lo que los trajo hasta donde están hoy, no los va a llevar a donde quieren ir.'\n\n[Deja que eso aterrice. No llena el silencio.]\n\n'Eso no es una crítica. Es el problema más honesto que existe para cualquier founder en Latam. Y es exactamente el problema que vamos a trabajar hoy.'"},
 og:null},

{bl:"Apertura",st:"modified",
 nv:{n:"A3",t:"Los 4 Ingredientes",i:"imgs/n05.jpg",
   propuesta:"Diagrama circular con los 4 ingredientes en la apertura, con indicador de que hoy se trabaja el primero. En la original aparecían al final del deck.",
   script:"'En todos estos años — construyendo Rappi, invirtiendo en más de ochenta empresas en B2, acompañando a founders en Latam — llegué a una conclusión que parece simple pero que la mayoría no tiene claro:'\n\n'Para hacer una expansión de clase mundial se necesitan cuatro cosas. Exactamente cuatro.'\n\n[Aparecen uno por uno]\n\n'La mentalidad más fuerte posible. La estrategia correcta en el momento correcto. Una cultura que no se conforma. Y ciclos de iteración ultrarrápidos.'\n\n[Pausa. Los mira.]\n\n'Eso es todo. No hay quinto ingrediente. No hay lista de cuarenta y siete hábitos. Solo estos cuatro.'\n\n'Yo desarrollo los primeros tres. Dylan les va a mostrar cómo se construye la velocidad.'\n\n'Antes de arrancar con el primero — necesito preguntarles algo.'"},
 og:{n:"41/42",t:"Ingredientes de la expansión",d:"Lista de 6 ingredientes ubicada al final del deck después de 40 slides. Duplicada.",i:"imgs/o02.jpg"}},

{bl:"Apertura",st:"new",
 nv:{n:"A4",t:"El Gran Domino",i:"imgs/n06.jpg",
   propuesta:"Slide en negro sin texto. Andrés camina hacia la audiencia — no hacia la pantalla. La pantalla no importa en este momento.",
   script:"[Camina hacia la audiencia. No hacia la pantalla — hacia la gente.]\n\n'¿Cuántos de ustedes, si son completamente honestos, creen que el mayor obstáculo de su empresa hoy es capital?'\n\n[Levanta su propia mano. Espera.]\n\n'¿O mercado? ¿O competencia? ¿O no tener el equipo correcto?'\n\n[La mayoría levanta la mano. Andrés asiente despacio, sin juzgar.]\n\n'Bien. Los entiendo completamente. Yo pensaba exactamente lo mismo.'\n\n[Baja su mano. Pausa larga.]\n\n'Están equivocados.'\n\n[Silencio. No llena el espacio.]\n\n'No porque su empresa no necesite capital, o mercado, o equipo. Los necesita. Sino porque eso no es el obstáculo real.'\n\n'Rappi tampoco tenía capital cuando empezamos. Tampoco teníamos equipo. Tampoco teníamos mercado validado.'\n\n[Pausa.]\n\n'¿Qué teníamos?'\n\n[Cuatro segundos de silencio. Deja que la pregunta flote.]\n\n'Una percepción del mundo que hacía que lo imposible pareciera posible.'\n\n[Señala su cabeza.]\n\n'El mayor obstáculo de su empresa no está afuera. Está en cómo ven el mundo. Y eso — eso sí lo podemos cambiar en estos tres días.'\n\n'Arrancamos.'"},
 og:null},

{bl:"Mindset",st:"same",
 nv:{n:"2",t:"MINDSET (sección)",i:"imgs/n07.jpg",
   propuesta:"Slide de sección. MINDSET en grande, fondo negro. Quote: 'Mindset no es actitud. Es el sistema operativo desde donde tomas todas tus decisiones.'",
   script:"'Cuando digo mindset — no estoy hablando de optimismo. No estoy hablando de pensamiento positivo.'\n\n'Estoy hablando del sistema operativo desde donde tomas todas tus decisiones. El conjunto de creencias que determinan qué ves como posible, qué interpretas como una amenaza, qué ves como una oportunidad.'\n\n'Dos founders en el mismo mercado, con el mismo capital, con el mismo equipo — pueden tener resultados completamente distintos. La diferencia no es el mercado. Es el sistema operativo.'\n\n'Y el sistema operativo se puede cambiar. Eso es lo que vamos a ver hoy.'"},
 og:{n:"2",t:"MINDSET (sección)",d:"Igual. La presentación arrancaba aquí sin apertura previa.",i:"imgs/o03.jpg"}},

{bl:"Mindset",st:"modified",
 nv:{n:"3",t:"Rappi: mucho Will · poco Skill",i:"imgs/n08.jpg",
   propuesta:"El cuadrante Will-Skill con Rappi ubicado en alto Will / bajo Skill. La historia narrada visualmente, no solo verbal.",
   script:"'El primer instrumento que quiero darles se llama el Will-Skill Filter. Es la herramienta de diagnóstico que uso antes de cualquier decisión de escala.'\n\n'Tiene dos ejes. El primero es Skill — conocimiento, experiencia, habilidades técnicas. El segundo es Will — ganas, determinación, convicción de que es posible.'\n\n[Aparece el cuadrante superior derecho.]\n\n'Alto skill, alto will — esto es lo que todos quieren.'\n\n[Aparece el cuadrante inferior derecho.]\n\n'Alto skill, bajo will — este es el perfil más traicionero. Sabe exactamente qué hacer pero no cree que valga la pena. En una empresa, este perfil se convierte en cinismo institucional.'\n\n[Aparece el cuadrante inferior izquierdo.]\n\n'Bajo skill, bajo will — aquí no hay nada que hacer por ahora.'\n\n[Aparece el cuadrante superior izquierdo. Andrés se detiene.]\n\n'Y aquí está el cuadrante que nadie enseña.'"},
 og:{n:"3",t:"Mucho Will · Poco Skill",d:"Solo foto del equipo. La historia estaba en las notas del speaker.",i:"imgs/o04.jpg"}},

{bl:"Mindset",st:"same",
 nv:{n:"4",t:"Will-Skill + Ignorancia pura",i:"imgs/n09.jpg",
   propuesta:"El cuadrante superior izquierdo se ilumina con la etiqueta: 'Ignorancia pura — Alto will · Poco skill.'",
   script:"'Alto will, poco skill. Aquí es donde arrancó Rappi.'\n\n'Y lo llamo ignorancia pura — no como insulto, sino como descripción precisa. No sabíamos qué no sabíamos. Y eso, contraintuitivamente, fue nuestra ventaja.'\n\n'Cuando no sabes que algo es imposible — lo intentas. Cuando no sabes que nadie lo ha logrado antes — no tienes ese ancla.'\n\n[Pausa.]\n\n'El problema de acumular mucho skill sin trabajar el will es que te vuelves cada vez más consciente de las razones por las que algo puede fallar. Esa sofisticación te paraliza.'\n\n'La ignorancia pura no dura para siempre — eventualmente tienes que desarrollar el skill. Pero el will tiene que ser lo primero. Porque el will busca el skill. El skill sin will solo busca razones para no moverse.'\n\n[Mira a la sala.]\n\n'La pregunta para ustedes — ¿en cuál cuadrante está usted hoy? ¿Y en cuál cuadrante están las decisiones más importantes que tienen pendientes?'"},
 og:{n:"4",t:"Will-Skill + Ignorancia pura",d:"Igual contenido.",i:"imgs/o05.jpg"}},

{bl:"Mindset",st:"same",
 nv:{n:"5",t:"Las creencias son el sistema operativo",i:"imgs/n10.jpg",
   propuesta:"Quote en pantalla: 'Las creencias no son el punto de partida. Son el sistema operativo.'",
   script:"'Bien. Entonces — ¿qué determina si tienes will o no? ¿Qué determina si ves algo como posible o imposible?'\n\n'Las creencias.'\n\n'No como concepto filosófico. Como mecanismo operativo. Las creencias son el código que corre por debajo de cada decisión que toman.'\n\n'Si creen que les queda grande Estados Unidos — van a tomar decisiones consistentes con esa creencia. No porque sean cobardes. Sino porque el sistema operativo está generando esas decisiones automáticamente, debajo de la superficie, sin que ustedes lo noten.'\n\n'Eso es lo que vamos a ver ahora. Primero el diagnóstico — qué creencias están corriendo. Después el sistema para cambiarlas.'"},
 og:{n:"5",t:"Las creencias es donde todo empieza",d:"Igual.",i:"imgs/o06.jpg"}},

{bl:"Mindset",st:"modified",
 nv:{n:"6",t:"Diagnóstico: creencias limitantes en Latam",i:"imgs/n11.jpg",
   propuesta:"Lista consolidada de creencias limitantes — aparecen una por una: 'Nos queda grande EE.UU.' / 'Hay que sufrir para tener éxito' / 'Necesito mucho dinero' / 'Soy pésimo en ventas' / 'No estoy en la rosca' / 'Los chinos nos van a barrer.'",
   script:"'Les voy a leer una lista. Y les pido que presten atención a su reacción física cuando escuchan cada una.'\n\n[Lee cada creencia con pausa entre ellas.]\n\n'Nos queda grande Estados Unidos.'\n'Hay que sufrir para tener éxito.'\n'Necesito mucho dinero para armar un equipo world class.'\n'Soy pésimo en ventas.'\n'No estoy en la rosca.'\n'Los chinos nos van a barrer.'\n\n[Pausa. Los mira.]\n\n'¿Cuántas de esas resonaron? No digo que las crean conscientemente — digo que cuántas generaron algo en su cuerpo cuando las escucharon. Una pequeña contracción. Un «bueno, algo de razón tiene.» Un «eso lo he pensado.»'\n\n'Eso es el sistema operativo corriendo. Y lo más interesante no es que esas creencias existan — es que están tan normalizadas en Latam que no las cuestionamos. Las heredamos del ambiente sin filtro.'"},
 og:{n:"6+7",t:"Dos slides separados por creencia",d:"Slide 6: 'Nos queda grande EE.UU.' / Slide 7: 'Hay que sufrir'. Sin lista.",i:"imgs/o07.jpg"}},

{bl:"Mindset",st:"same",
 nv:{n:"7",t:"¿Cuáles son las tuyas?",i:"imgs/n12.jpg",
   propuesta:"'¿Cuál es la creencia limitante más cara que tienes en tu empresa hoy?' — Una sola pregunta. Ejercicio de 3 minutos.",
   script:"'Quiero que hagan esto ahora. Tres minutos. Solos.'\n\n'Piensen en el problema más importante que tiene su empresa hoy. El que los desvela.'\n\n'Ahora pregúntense: ¿qué tendría que ser verdad sobre mí mismo — no sobre el mercado, no sobre la competencia, no sobre el capital — sino sobre mí mismo — para que ese problema no existiera o fuera mucho más pequeño?'\n\n'Eso es su creencia limitante más cara. Escríbanla.'\n\n[Espera tres minutos en silencio. Camina por la sala sin hablar.]\n\n'¿Alguien quiere compartir? No es obligatorio — pero sí invito a los valientes.'\n\n[Escucha dos o tres respuestas. No evalúa ni corrige. Solo valida: «Eso es muy honesto.» «Ese es un diagnóstico poderoso.»]"},
 og:{n:"9",t:"¿Cuáles son tus creencias limitantes?",d:"Lista de ejemplos.",i:"imgs/o08.jpg"}},

{bl:"Mindset",st:"same",
 nv:{n:"8",t:"Creencias potentes de Rappi",i:"imgs/n13.jpg",
   propuesta:"Las 5 creencias que sí funcionaron: Todo es posible / El éxito depende de determinación / Somos capaces de hacer cosas gigantes / Crecer es oxígeno / Somos suertudos.",
   script:"'Ahora el contraste.'\n\n'En Rappi teníamos cinco creencias que hoy, en retrospectiva, entiendo que fueron el combustible real del crecimiento.'\n\n[Lee cada una con pausa.]\n\n'Todo es posible. No como frase motivacional. Como premisa operativa de todas las decisiones.'\n\n'El éxito depende del nivel de determinación y convicción. No de los recursos. No de las conexiones. De cuánto quieres y qué tan convencido estás.'\n\n'Somos capaces de hacer cosas gigantes. Esa creencia hacía que cuando llegaba una oportunidad que parecía demasiado grande — la primera respuesta no era «no podemos» sino «¿cómo la hacemos?»'\n\n'Crecer es oxígeno. No una opción. No una meta. Una necesidad existencial.'\n\n[Pausa antes de la quinta.]\n\n'Y la quinta — somos suertudos. A eso voy a volver en un momento. Porque la suerte tiene una mecánica que la mayoría no conoce.'"},
 og:{n:"8",t:"Creencias potentes en Rappi",d:"Igual.",i:"imgs/o09.jpg"}},

{bl:"Mindset",st:"modified",
 nv:{n:"9",t:"El Loop de Expansión",i:"imgs/n14.jpg",
   propuesta:"Diagrama circular: Creencias → Percepciones → Oportunidades → Resultados → retroalimenta Creencias.",
   script:"'Este es el mecanismo. Este es el Loop de Expansión.'\n\n'Las creencias determinan qué percepciones tienes del mundo — qué ves como oportunidad, qué interpretas como amenaza. Esas percepciones determinan qué oportunidades aprovechas. Lo que aprovechas produce resultados. Y los resultados retroalimentan las creencias.'\n\n'El loop puede ser virtuoso o vicioso. Y la dirección del loop la determina el sistema operativo inicial.'\n\n'Si arrancan con «somos capaces de hacer cosas gigantes» — ven oportunidades que otros no ven, las aprovechan, obtienen resultados que confirman la creencia, y el loop se amplifica.'\n\n'Si arrancan con «nos queda grande Estados Unidos» — filtran oportunidades que no son para nosotros, no las aprovechan, no obtienen esos resultados, y eso confirma la creencia.'\n\n[Pausa.]\n\n'El sistema operativo no es neutral. Produce exactamente lo que promete.'"},
 og:{n:"10+14",t:"Loop (imagen) + Círculo creencias — dos slides",d:"El mismo concepto en dos slides distintos.",i:"imgs/o10.jpg"}},

{bl:"Mindset",st:"modified",
 nv:{n:"10",t:"La ciencia detrás (Lipton — 3 ideas)",i:"imgs/n15.jpg",
   propuesta:"Solo 3 ideas clave de Lipton: El 95% de tu comportamiento corre en el subconsciente / Puedes reprogramarte / Tus creencias cambian tu biología.",
   script:"'Antes de pasar al sistema para cambiar las creencias — un momento de ciencia. Para los más escépticos.'\n\n'El Dr. Bruce Lipton, biólogo celular, pasó décadas estudiando exactamente esto. Y sus conclusiones son relevantes para nosotros.'\n\n'Primero: el noventa y cinco por ciento de tu comportamiento diario corre en el subconsciente. No en la mente consciente. En piloto automático. Eso significa que las decisiones que crees que estás tomando conscientemente — la mayoría ya estaban tomadas por el sistema operativo antes de que llegaras a ellas.'\n\n'Segundo: puedes reprogramarte. Las creencias no son permanentes. Se pueden cambiar con conciencia, repetición y práctica.'\n\n'Tercero: tus creencias cambian tu biología. Literalmente. El estado de creencia en que operas tiene efectos físicos medibles. El estrés crónico del que opera desde el locus externo — desde «el problema está afuera» — tiene consecuencias fisiológicas reales.'\n\n'No es motivación. Es biología.'"},
 og:{n:"11+12+13",t:"Lipton: 10 ideas en 3 slides",d:"Muy denso.",i:"imgs/o11.jpg"}},

{bl:"Mindset",st:"new",
 nv:{n:"11",t:"Lipton: 3 ideas aplicadas al negocio",i:"imgs/n16.jpg",
   propuesta:"Las mismas 3 ideas de Lipton traducidas al lenguaje de empresa.",
   script:"'Conectemos esto directamente con su empresa.'\n\n'Si el noventa y cinco por ciento corre en subconsciente — eso significa que las creencias que no han examinado están tomando decisiones de negocio por ustedes en este momento. Cuando decidieron no entrar a ese mercado, cuando no hicieron esa contratación, cuando no pidieron ese capital — ¿cuánto de esa decisión fue consciente y cuánto fue el sistema operativo corriendo por debajo?'\n\n'Si se pueden reprogramar — el trabajo que hicieron hoy, identificar esas creencias y cuestionarlas, es literalmente cambiar el software desde el que operan su empresa.'\n\n'Y si las creencias cambian la biología — el costo del locus externo no es solo psicológico. Es físico. El founder que cree que el problema está siempre afuera opera con niveles de estrés crónicos que tienen consecuencias reales en su capacidad de tomar buenas decisiones.'\n\n[Pausa.]\n\n'No están en un taller de mindset. Están haciendo ingeniería de sistemas sobre su empresa.'"},
 og:null},

{bl:"Mindset",st:"modified",
 nv:{n:"12",t:"El Mindset Escalador (sección)",i:"imgs/n17.jpg",
   propuesta:"Slide de sección: 'El Mindset Escalador' con las 3 capas que vienen.",
   script:"'Ahora el sistema. Las tres capas del Mindset Escalador.'\n\n'Si el sistema operativo está en creencias — entonces hay que saber cuáles instalar. No cualquier creencia positiva. Las creencias específicas que hacen posible una expansión de clase mundial.'\n\n'Hay tres capas. Cada una apoya a la siguiente. Y las tres son necesarias — sin la tercera, las primeras dos no sostienen.'"},
 og:{n:"20+21",t:"¿Cómo mejoro mi mindset? + 3 científicos",d:"Pregunta de transición + foto sin integración.",i:"imgs/o12.jpg"}},

{bl:"Mindset",st:"modified",
 nv:{n:"13",t:"Capa 1: Todo se puede desarrollar",i:"imgs/n18.jpg",
   propuesta:"Carol Dweck integrada como herramienta práctica. Todas las habilidades se desarrollan / Los retos son oportunidades / El esfuerzo es el camino.",
   script:"'Primera capa: todo se puede desarrollar.'\n\n'El trabajo de Carol Dweck sobre el Growth Mindset es el fundamento de esta capa. La idea es simple pero radical: la inteligencia y el talento no son fijos. Son cualidades dinámicas que se cultivan con dedicación, esfuerzo y estrategia.'\n\n'Para founders — esto tiene una implicación directa. No hay área de tu empresa que sea «imposible para mí.» Hay áreas donde aún no tienes el skill, que puedes desarrollar o contratar.'\n\n'La primera creencia limitante de Latam que queríamos romper era exactamente esa — «soy pésimo en ventas.» O en finanzas. O en tecnología. Esas frases asumen que el skill es fijo. No lo es.'\n\n[Pausa.]\n\n'La Capa 1 es la permisión. La permisión de ir a buscar el skill que todavía no tienes, en lugar de asumir que nunca lo vas a tener.'"},
 og:{n:"22",t:"Carol Dweck — Growth Mindset",d:"Texto muy extenso.",i:"imgs/o13.jpg"}},

{bl:"Mindset",st:"modified",
 nv:{n:"14",t:"Capa 2: La confianza se construye",i:"imgs/n19.jpg",
   propuesta:"Bandura — 4 fuentes: Hazlo (experiencia directa) / Míralo (role modeling) / Escúchalo (persuasión social) / Reencuádralo (estado emocional).",
   script:"'Segunda capa: la confianza se construye.'\n\n'La primera palanca — y más poderosa — es la experiencia de dominio. Hacer algo difícil y lograrlo. Cada vez que logran algo que creían que no podían — su biología cambia. Se instala una nueva evidencia de que son capaces.'\n\n'La segunda es el role-modeling. Ver a alguien similar a ustedes lograr algo que consideraban imposible elimina la excusa más poderosa: «yo no puedo porque nadie como yo lo ha hecho.» Cuando alguien como ustedes lo logra — la excusa desaparece.'\n\n[Pausa.]\n\n'La tercera es la persuasión social. Cuando alguien que respetan les dice que pueden hacer algo que dudan que puedan hacer. Eso se convierte en profecía autocumplida.'\n\n'Y la cuarta — la más subestimada — es el reencuadre emocional.'\n\n[Camina hacia la sala.]\n\n'Muchos de ustedes interpretan el estrés, la ansiedad, la presión de construir algo grande — como señales de que no están capacitados para esto. No lo están. El estrés no es señal de incompetencia. Es señal de que lo que están haciendo importa. La cuarta palanca es aprender a leer esa señal de otra manera.'"},
 og:{n:"23",t:"Albert Bandura — Autosuficiencia",d:"Texto académico extenso.",i:"imgs/o14.jpg"}},

{bl:"Mindset",st:"same",
 nv:{n:"15",t:"Capa 3: Tú eres el responsable",i:"imgs/n20.jpg",
   propuesta:"Rotter — Locus de Control Interno vs Externo. Locus interno como decisión de diseño.",
   script:"'Tercera capa. La más incómoda.'\n\n'Hay un concepto en psicología llamado locus de control. Locus externo: los resultados dependen del mercado, de la suerte, de las condiciones. Yo soy un actor en un escenario que otros controlan. Locus interno: los resultados dependen principalmente de mis decisiones, mi esfuerzo, mi capacidad de responder.'\n\n[Pausa.]\n\n'Aquí hay una trampa en Latam que quiero nombrar directamente. Muchas de las creencias que exploramos antes — «nos queda grande Estados Unidos», «necesito estar en la rosca» — son creencias de locus externo. El problema está afuera. Yo no controlo lo que pasa.'\n\n'Y lo interesante no es que sean falsas. Algunas son parcialmente verdad. Lo interesante es lo que producen: inacción justificada.'\n\n[Camina al centro.]\n\n'La tercera capa del Mindset Escalador es una decisión. No un sentimiento. Una decisión de operar desde el locus interno — de asumir que, independientemente de las circunstancias externas, la capacidad de responder a esas circunstancias está en mí.'\n\n'No es negación de la realidad. Es la única posición desde la que se puede construir algo.'"},
 og:{n:"24",t:"Julian Rotter — Locus de Control",d:"Igual concepto.",i:"imgs/o15.jpg"}},

{bl:"Mindset",st:"modified",
 nv:{n:"16",t:"Ejercicio: la creencia más cara",i:"imgs/n21.jpg",
   propuesta:"3 preguntas: ¿Cuál es tu creencia limitante más cara? / ¿Qué resultado está produciendo? / ¿Cuál sería la creencia potente que la reemplaza?",
   script:"'Ahora conectamos todo.'\n\n'Tienen escritas sus creencias limitantes. Quiero que hagan este ejercicio en tres pasos. Cinco minutos.'\n\n'Primero: la creencia. Ya la tienen escrita.'\n\n'Segundo: el resultado que está produciendo. Sea honesto. ¿Qué decisiones ha tomado — o no ha tomado — porque esa creencia corre en su sistema operativo?'\n\n'Tercero: la creencia potente que la reemplaza. No su opuesto superficial — su versión desde el locus interno, desde el Mindset Escalador. Si su creencia limitante es «soy malo para las ventas» — su creencia potente no es «soy bueno para las ventas.» Su creencia potente es «las ventas son un músculo. Estoy en los primeros doscientos intentos. Voy a desarrollarlo.»'\n\n[Espera cinco minutos. Camina sin hablar.]\n\n'¿Alguien quiere compartir su creencia potente? Solo la potente — no necesitan compartir la limitante si no quieren.'"},
 og:{n:"25",t:"Slide de imagen (sin texto)",d:"Solo imagen, el ejercicio solo existía en las notas.",i:"imgs/o16.jpg"}},

{bl:"Suerte",st:"modified",
 nv:{n:"17",t:"El Código de la Suerte (sección)",i:"imgs/n22.jpg",
   propuesta:"Slide de sección. 'El Código de la Suerte — El output del mindset correcto.'",
   script:"'Antes de cerrar el bloque de mindset — les prometí volver a la quinta creencia de Rappi. «Somos suertudos.»'\n\n[Sonríe.]\n\n'Hay un investigador llamado Richard Wiseman que pasó años estudiando a personas que se consideran afortunadas versus las que se consideran desafortunadas. Y encontró algo que parece obvio cuando lo escuchan pero que cambia todo.'\n\n'Las personas «suertudas» no tienen más oportunidades que las demás. Tienen más apertura perceptual para verlas.'\n\n[Pausa.]\n\n'En otras palabras — la suerte no es algo que te pasa. Es algo que percibes. Y lo que percibes depende directamente de las creencias con las que ves el mundo.'\n\n'No es magia. Es sistema operativo.'"},
 og:{n:"15",t:"¿Será bueno creer que somos suertudos?",d:"Pregunta, no afirmación. Sin frame de sistema.",i:"imgs/o17.jpg"}},

{bl:"Suerte",st:"modified",
 nv:{n:"18",t:"La suerte no es aleatoria",i:"imgs/n23.jpg",
   propuesta:"Quote de impacto: 'La suerte no es lo que te pasa. Es lo que produces con el mindset correcto.'",
   script:"'Un founder que cree que «no está en la rosca» literalmente no va a ver las oportunidades de conexión que están frente a él. Un founder que cree que «somos suertudos» — está activamente buscando la oportunidad en cada situación.'"},
 og:{n:"16+17+18",t:"¿Cómo ser suertudos? (3 slides)",d:"Framework en tabla repetido en 3 slides.",i:"imgs/o18.jpg"}},

{bl:"Suerte",st:"same",
 nv:{n:"19",t:"Los 4 tipos de suerte",i:"imgs/n24.jpg",
   propuesta:"Los 4 tipos en secuencia: Ciega / Esfuerzo / Preparación / Carácter.",
   script:"'Hay cuatro tipos de suerte. Y solo uno de ellos no puedes diseñar.'\n\n[Tipo 1] 'El primero es la suerte ciega. La lotería. Este no lo controlas.'\n\n[Tipo 2] 'El segundo es la suerte por esfuerzo. Cuando te mueves — cuando haces muchas cosas, cuando experimentas — generas más superficie de contacto con oportunidades.'\n\n[Tipo 3] 'El tercero es la suerte por preparación. El experto ve oportunidades que el principiante no puede ver. Porque el experto sabe qué buscar.'\n\n[Tipo 4 — pausa.] 'Y el cuarto — el más poderoso y el más ignorado — es la suerte por carácter. Es cuando tu reputación, tus valores, quién eres como persona — se convierten en un imán para oportunidades específicas. Las oportunidades te buscan a ti.'\n\n[Pausa.]\n\n'¿Ven la conexión con las creencias? Un founder que opera desde el Mindset Escalador — que asume responsabilidad, que se mueve, que desarrolla expertise, que construye reputación — está activando los tipos dos, tres y cuatro simultáneamente.'\n\n'«Somos suertudos» no es ingenuidad. Es una decisión de diseño que activa el sistema completo.'"},
 og:{n:"19",t:"Los 4 tipos de suerte",d:"Igual.",i:"imgs/o19.jpg"}},

{bl:"Suerte",st:"new",
 nv:{n:"20",t:"Somos suertudos como decisión",i:"imgs/n25.jpg",
   propuesta:"'Somos suertudos' — No es ingenuidad. Es una decisión de diseño.",
   script:"'En Rappi, «somos suertudos» no era una frase. Era una decisión colectiva de operar con percepción abierta. De asumir que la oportunidad existe — y que nuestra tarea es encontrarla.'\n\n'¿Cuántas oportunidades no han visto porque su sistema operativo las filtró antes de que llegaran a la conciencia?'\n\n[Pausa. Los deja con la pregunta.]\n\n'Eso es el bloque de mindset. Tienen el diagnóstico, tienen el sistema — el Mindset Escalador — y tienen la comprensión de que la suerte no es aleatoria.'\n\n'Ahora les voy a pedir que apliquen todo esto a algo concreto. La prueba de fuego del mindset.'"},
 og:null},

{bl:"Suerte",st:"new",
 nv:{n:"20B",t:"Las 4 palancas del Código de la Suerte",i:"imgs/n26.jpg",
   propuesta:"Grilla 2×2: Volumen / Expertise / Reputación / Percepción abierta.",
   script:"'Entonces el código de la suerte — las cuatro cosas que puedes hacer hoy para ser más suertudo — son estas.'\n\n'Volumen. Más intentos. Más conversaciones. Más experimentos. La suerte no te encuentra si estás quieto.'\n\n'Expertise. Vuélvete muy bueno en algo específico. El experto ve el patrón que el novato no puede ver.'\n\n'Reputación. Quién eres fuera de la sala de reuniones. Lo que la gente dice de ti cuando no estás. Eso determina qué oportunidades llegan a tu puerta.'\n\n'Y percepción abierta. La capacidad de ver la oportunidad en el problema. Lo entrena exactamente el trabajo de creencias que acaban de hacer. El Mindset Escalador activa esta palanca.'"},
 og:null},

{bl:"Meta 30x",st:"modified",
 nv:{n:"21",t:"La Meta Imposible 30x (sección)",i:"imgs/n27.jpg",
   propuesta:"Slide de sección + transición: 'El mindset correcto sin una meta imposible no tiene dirección.'",
   script:"'Todo lo que vimos en el bloque de mindset es el motor. Pero un motor sin dirección solo gira en círculos.'\n\n'La primera aplicación real del Mindset Escalador es definir una meta que sea consistente con él. Una meta que solo sea posible si el sistema operativo está bien calibrado.'\n\n'Eso es el Meta Imposible 30x.'"},
 og:{n:"31",t:"¿Cómo defino metas?",d:"Solo pregunta de transición, sin framework.",i:"imgs/o21.jpg"}},

{bl:"Meta 30x",st:"new",
 nv:{n:"22",t:"30x vs 30%",i:"imgs/n28.jpg",
   propuesta:"Contraste visual: 30% = optimiza lo actual / 30x = hace obsoleta la estrategia, obliga a pensar diferente.",
   script:"'La mayoría de los founders que conozco — cuando definen sus metas para el año — ponen entre diez y veinte por ciento de crecimiento. A veces llegan al treinta.'\n\n'¿Por qué? Porque ese rango se siente alcanzable. Se puede lograr optimizando lo que ya existe.'\n\n'El problema de una meta del treinta por ciento es que no cambia nada fundamental. La estrategia sigue siendo la misma. Las creencias siguen siendo las mismas.'\n\n[Pausa.]\n\n'Ahora les voy a decir algo que parece paradójico: una meta 30x es más fácil que una meta del treinta por ciento.'\n\n[Los founders reaccionan. Andrés espera.]\n\n'No más fácil de lograr — más fácil de pensar. Porque una meta 30x hace obsoleta toda su estrategia actual. No pueden llegar ahí haciendo más de lo mismo. Eso los libera de las restricciones actuales. Los obliga a pensar desde cero.'\n\n'Una meta del treinta por ciento los ata a lo que ya existe. Una meta 30x los libera para inventar.'"},
 og:null},

{bl:"Meta 30x",st:"new",
 nv:{n:"23",t:"Los 4 filtros de la Meta Imposible 30x",i:"imgs/n29.jpg",
   propuesta:"4 filtros: ¿Te da vértigo? / ¿Requiere nueva versión de ti? / ¿Hace obsoleta la estrategia? / ¿Obliga a soltar creencias?",
   script:"'Para que una meta sea un Meta Imposible 30x real — tiene que pasar los cuatro filtros.'\n\n'Primero: ¿te da vértigo solo de pensarlo? No incomodidad leve. Vértigo real. Si tu reacción es «qué ambicioso» — no es suficientemente grande. Tiene que ser «esto es una locura.» Ese vértigo es la señal de que estás al borde de tu sistema operativo actual.'\n\n'Segundo: ¿requiere una versión de ti que todavía no existe? Si puedes lograr esa meta siendo exactamente quien eres hoy — no es un Meta Imposible 30x. Es un plan de trabajo.'\n\n'Tercero: ¿hace que tu estrategia actual quede obsoleta? Si puedes llegar ahí con la misma estrategia que tienes — solo trabajando más horas — no es imposible. Es ambicioso. No es lo mismo.'\n\n'Cuarto: ¿obliga a soltar creencias limitantes para creerlo posible? Si puedes creer en esa meta con tu sistema operativo actual — sin cambiar nada de lo que trabajamos esta mañana — no es el Meta Imposible 30x correcto.'\n\n[Pausa.]\n\n'El Meta Imposible 30x correcto hace que todas las creencias limitantes que escribieron sean relevantes. Porque para lograr esa meta — tienen que soltar exactamente esas creencias.'"},
 og:null},

{bl:"Meta 30x",st:"new",
 nv:{n:"24",t:"Escríbelo",i:"imgs/n30.jpg",
   propuesta:"Instrucción directa: 'Escribe tu Meta Imposible 30x. En presente. Sin racionalizar el cómo. 5 minutos. Ahora.'",
   script:"'Ahora el ejercicio más importante de la mañana. Quiero que escriban su Meta Imposible 30x para el siguiente año. Tienen cinco minutos.'\n\n'Tres reglas.'\n\n'Primera: escríbanlo en presente. No «quiero lograr» — sino «somos la empresa que.» Como si ya fuera verdad.'\n\n'Segunda: no racionalicen el cómo. Ese no es el ejercicio ahora. El ejercicio es definir el qué.'\n\n'Tercera: que pase los cuatro filtros. Si lo leen y no les da vértigo — agrandénlo hasta que dé vértigo.'\n\n[Espera en silencio cinco minutos.]\n\n'Cuando estén listos — los que quieran compartirlo, hay tiempo para hacerlo ahora.'"},
 og:null},

{bl:"Workshop",st:"new",
 nv:{n:"25",t:"¿Quién quiere compartir?",i:"imgs/n31.jpg",
   propuesta:"Workshop en vivo con 10-15 voluntarios. Andrés challengea en vivo con preguntas específicas.",
   script:"'Necesito entre diez y quince personas que quieran compartir su Meta Imposible 30x con el grupo.'\n\n'Así funciona: lo comparten, el grupo lo escucha, yo les hago una pregunta. Una sola.'\n\n[Para cada founder, usa una de estas preguntas según lo que escucha:]\n\n'¿Eso te da vértigo real o solo te incomoda un poco?'\n'¿Qué creencia limitante de las que escribiste esta mañana está achicando ese número?'\n'¿Si no tuvieras esa creencia — cuánto más grande sería esa meta?'\n'¿Qué versión de ti necesitas ser para lograr eso? ¿Existe ya esa versión o hay que construirla?'\n'¿Eso requiere cambiar algo fundamental en cómo operas, o es básicamente lo mismo con más energía?'\n\n[Al final:]\n\n'Esto que acaban de hacer — compartirlo, recibir el push, amplificarlo — es exactamente lo que hace Multipliers cada dos semanas. Pero eso viene después. Ahora — tenemos el mindset calibrado y la meta definida. Falta el sistema para lograrla.'"},
 og:null},

{bl:"Workshop",st:"new",
 nv:{n:"25B",t:"Transición Workshop → Sistema",i:"imgs/n32.jpg",
   propuesta:"'Ya tienen el mindset. Ya tienen la Meta Imposible 30x. ¿Con qué sistema la logran?'",
   script:"'Todo lo que vimos esta mañana es el anillo exterior.'\n\n[Señala el diagrama.]\n\n'El mindset es el anillo que envuelve todo el sistema. Sin el anillo bien calibrado — la mejor estrategia del mundo produce resultados mediocres. El mejor equipo del mundo opera por debajo de su potencial.'\n\n'Ahora vienen los tres ingredientes que hacen posible esa meta.'"},
 og:null},

{bl:"30X OS",st:"new",
 nv:{n:"26",t:"El 30X Exponential OS",i:"imgs/n33.jpg",
   propuesta:"Diagrama circular: MINDSET (anillo) → STRATEGY → PEOPLE → EXECUTION → SPEED & CAPABILITIES (centro).",
   script:"'Este es el 30X Exponential OS. No es un framework de consultoría. Es el sistema operativo que usamos para construir Rappi, que Daniel usó para construir Truora, y que Dylan ha visto funcionar en decenas de empresas en Latam.'\n\n[Señala el centro.]\n\n'Y en el centro — Speed and Capabilities. No como un ingrediente más. Como el resultado de los cuatro bien calibrados y girando en la misma dirección.'"},
 og:null},

{bl:"30X OS",st:"modified",
 nv:{n:"27",t:"Los 4 ingredientes (tracker de progreso)",i:"imgs/n34.jpg",
   propuesta:"Tracker con estado: Mindset ✓ · Estrategia → · People → · Ciclos →",
   script:"'Ya tienen el primero. El mindset está calibrado. La meta 30x está definida.'\n\n'Ahora vienen los tres ingredientes que hacen posible esa meta.'\n\n'Voy a darles una introducción a la estrategia y a la cultura — que también son parte de mi presentación. Y Dylan va a cerrar con los ciclos de iteración y la construcción del flywheel.'\n\n'Sigamos.'"},
 og:{n:"40+43",t:"Expansión World Class + PMF prerequisito",d:"6 ingredientes sin tracker.",i:"imgs/o24.jpg"}},

{bl:"Estrategia",st:"new",
 nv:{n:"28",t:"ESTRATEGIA (sección)",i:"imgs/n35.jpg",
   propuesta:"Slide de sección. ESTRATEGIA en grande. Ingrediente 2.",
   script:"'El segundo ingrediente es la estrategia. Y voy a ser muy específico sobre qué significa estrategia en este contexto.'\n\n'No es un plan. No es una lista de iniciativas. No es un presupuesto.'\n\n'Estrategia es la respuesta a una sola pregunta: ¿cuál es el camino más directo desde donde estamos hoy hasta el Meta Imposible 30x?'"},
 og:null},

{bl:"Estrategia",st:"modified",
 nv:{n:"29",t:"La Meta define la Estrategia",i:"imgs/n36.jpg",
   propuesta:"'Tu Meta Imposible 30x acaba de hacer obsoleta tu estrategia actual. Eso no es un problema. Es el punto de partida.'",
   script:"'La razón por la que el Meta Imposible 30x va antes de la estrategia es exactamente esta: su meta 30x acaba de hacer obsoleta su estrategia actual.'\n\n'Si su meta es 30x — y su estrategia actual puede llevarlos a un crecimiento del treinta por ciento — entonces esa estrategia no sirve para la meta. Necesitan una estrategia nueva. Y para diseñar esa estrategia nueva, primero necesitaban el mindset que les permitiera pensarla.'\n\n'Ahora lo tienen.'"},
 og:{n:"37",t:"Hoja de trabajo SMART",d:"7 elementos sin conexión a ninguna meta.",i:"imgs/o22.jpg"}},

{bl:"Estrategia",st:"modified",
 nv:{n:"30",t:"Priorización implacable",i:"imgs/n37.jpg",
   propuesta:"'Priorización implacable: claridad perfecta sobre lo que agrega más valor.' Con la cita de Darth Vader.",
   script:"'La herramienta estratégica más importante que tengo — y que uso todos los días — es la priorización implacable.'\n\n'Claridad perfecta sobre qué agrega más valor. Y disposición total para despriorizar todo lo demás.'\n\n'En Rappi teníamos una frase — que en broma atribuíamos a Darth Vader consultando para nosotros: «No me hagas perder el tiempo.»'\n\n'No porque seamos groseros. Sino porque el tiempo y la atención son los recursos más escasos de cualquier empresa. Y cada hora que se dedica a algo que no mueve el Meta Imposible 30x — es una hora que se roba de lo que sí lo mueve.'\n\n'La pregunta que deben hacerse antes de cualquier iniciativa: ¿esto contribuye directamente al Meta Imposible 30x? Si la respuesta no es un sí claro — es un no.'"},
 og:{n:"55",t:"Priorización implacable",d:"Igual contenido, en bloque El Operador.",i:"imgs/o23.jpg"}},

{bl:"Estrategia",st:"new",
 nv:{n:"31",t:"Estrategia → Tácticas → Playbook",i:"imgs/n38.jpg",
   propuesta:"La secuencia: Estrategia (a dónde) → Tácticas (cómo) → Playbook (quién, cuándo, con qué métricas).",
   script:"'La secuencia que tienen que tener clara es esta.'\n\n'La estrategia dice a dónde. Define el camino. Cuál es el juego que estamos jugando y cómo ganamos.'\n\n'Las tácticas dicen cómo. Las acciones concretas, los experimentos, los movimientos específicos.'\n\n'El playbook dice quién hace qué, cuándo, con qué métricas de éxito.'\n\n'El error más común que veo en founders es mezclar las tres. Empezar por las tácticas sin tener la estrategia clara. O tener la estrategia pero no bajarla a playbook — con lo cual queda como una idea bonita que nadie ejecuta.'\n\n'Daniel y Dylan van a profundizar en cómo se diseña la estrategia correcta. Yo solo quería plantarles el marco.'"},
 og:null},

{bl:"Estrategia",st:"modified",

   propuesta:"5 elementos: Pregunta SMART / Contexto / Stakeholders / Criterios de éxito / Quick wins.",
   script:"'Una herramienta práctica antes de pasar a cultura.'\n\n'En Rappi aprendimos muy caro que el error más frecuente no es resolver mal un problema — es resolver el problema equivocado con mucha energía.'\n\n'Cuando estén en una discusión sin claridad — cuando el equipo esté girando en círculos — la intervención más poderosa es detenerse y preguntar: ¿cuál es exactamente el problema que estamos tratando de resolver?'\n\n'Y definirlo de forma SMART: específico, medible, relevante, con límite de tiempo. Si no pueden definirlo así — todavía no entienden el problema.'\n\n'Esta hoja de trabajo la usamos en Rappi antes de cualquier proyecto importante. Les recomiendo adoptarla.'"},

{bl:"Cultura",st:"modified",

   script:"'El tercer ingrediente es la cultura. Y quiero ser muy preciso sobre qué es cultura en este contexto.'\n\n'Cultura no es los valores que ponen en la pared. No es el team building de los viernes. No es el ping pong en la oficina.'\n\n'Cultura es la suma de decisiones que toma el equipo cuando nadie los está mirando. Es el comportamiento por default.'\n\n'Una cultura que no se conforma significa que el equipo — de forma natural, sin que el founder tenga que estar presente — elige el camino más difícil y más ambicioso cuando hay opciones.'"},
 og:{n:"46+47",t:"Cultura agresiva desplegada (duplicada)",d:"Los 14 principios de Rappi en dos slides casi idénticos.",i:"imgs/o25.jpg"}},

{bl:"Cultura",st:"new",

{bl:"Cultura",st:"modified",
 nv:{n:"34",t:"Los 14 principios Rappi",i:"imgs/n42.jpg",
   propuesta:"Los 14 principios en un slide limpio, sin duplicación.",
   script:"'En Rappi — y en las empresas que más admiro — la cultura es un conjunto de principios que el equipo vive, no que declara.'\n\n[Lee algunos con comentarios:]\n\n'Propietarios, no inquilinos. El inquilino cuida la propiedad porque le toca. El propietario la cuida porque es suya.'\n\n'Confrontación con principios. Animar al equipo a desafiar la autoridad cuando hay razón para hacerlo. Eso requiere mucha más valentía del líder que del equipo.'\n\n'Haz magia. Crear experiencias que parecen imposibles para el usuario. La diferencia entre una empresa que genera evangelistas y una que genera clientes satisfechos.'\n\n[Pausa.]\n\n'El punto no es que adopten estos principios. El punto es que definan los suyos — y que sean tan específicos y tan operativos que cualquier persona en su equipo sepa exactamente cómo se ve vivir ese principio en un día normal.'"},
 og:{n:"47",t:"14 principios Rappi (slide duplicado)",d:"Mismos principios, slide duplicado.",i:"imgs/o26.jpg"}},

{bl:"Cultura",st:"modified",
 nv:{n:"35",t:"Principios del operador",i:"imgs/n43.jpg",
   propuesta:"4 principios personales del operador: Responsabilidad total / Problem QB / Mente abierta / Ausencia de defensividad.",
   script:"'Además de los principios de cultura del equipo — hay principios personales del operador que, cuando el líder los vive, se convierten en cultura.'\n\n'Responsabilidad total: tengo total responsabilidad por el problema. No me detengo porque algo no esté en mi círculo de influencia — en cambio, expando el círculo. Soy el quarterback de la iniciativa.'\n\n'Mente abierta: los falsos trade-offs no existen. Cuando alguien propone algo que parece imposible, la primera respuesta no es «no se puede» sino «¿hay algo ahí?»'\n\n'Ausencia de defensividad: cuando alguien te da feedback difícil, la respuesta interna no es «no sabe de qué habla.» Es «debe haber algo que no estoy viendo.» La defensividad cierra el aprendizaje.'\n\n[Pausa.]\n\n'Cuando el líder vive estos cuatro principios — sin excepción, sin días libres — el equipo los aprende sin que nadie los enseñe.'"},
 og:{n:"50",t:"El Operador (tabla de mentalidades)",d:"Principios dispersos en 4 slides distintos.",i:"imgs/o27.jpg"}},

{bl:"Cultura",st:"modified",
 nv:{n:"36",t:"13 principios de reclutamiento (3 cards)",i:"imgs/n44.jpg",
   propuesta:"Los 3 más importantes: No delegas el reclutamiento / Rihanna Rule / Contratación en V.",
   script:"'El tercer ingrediente no es solo cultura — es quién entra a vivir esa cultura.'\n\n'La decisión de contratación es la decisión de mayor impacto que toman como líderes. No el producto, no la estrategia, no el capital. La persona que entra.'\n\n'Cinco principios que no negocio:'\n\n'Primero: nunca delegas el reclutamiento. Los mejores líderes que conozco dedican entre el veinte y el treinta por ciento de su tiempo a reclutar.'\n\n'Segundo — la Rihanna Rule. Work work work. El reclutamiento es un juego de volumen y constancia.'\n\n'Tercero: contratación en V. Los líderes tipo A contratan personas mejores que ellos. Los líderes tipo B contratan pares. Los líderes tipo C contratan personas peores para no ser amenazados.'\n\n'Cuarto: nada supera al referido. Nunca en mi vida contraté a alguien con referencias excelentes que no fuera una estrella.'\n\n'Quinto: ciclo de ventas rápido. El mejor candidato tiene tres ofertas encima de la mesa.'\n\n[Pausa.]\n\n'Daniel va a profundizar en todo el sistema de contratación. Yo solo quería plantar los principios desde los que opero.'"},
 og:{n:"67",t:"Recruiting principles (lista numerada)",d:"13 principios como lista sin desarrollo visual.",i:"imgs/o28.jpg"}},

{bl:"Cultura",st:"modified",

 og:{n:"68",t:"Inicio de 23 slides de profundidad operativa",d:"Cada principio en 1-4 slides.",i:"imgs/o29.jpg"}},

{bl:"Ciclos",st:"new",
 nv:{n:"37",t:"CICLOS DE ITERACIÓN (sección)",i:"imgs/n46.jpg",
   propuesta:"Slide de sección. CICLOS DE ITERACIÓN. Ingrediente 4.",
   script:"'El cuarto ingrediente es el que convierte todo lo anterior en velocidad.'\n\n'Mindset, estrategia, cultura — si no producen ciclos de aprendizaje rápidos, producen movimiento lento. Y en el mundo actual, la empresa que completa más ciclos de aprendizaje en menos tiempo, gana. Siempre.'\n\n'Les voy a dar dos herramientas de este ingrediente. Dylan va a construir el sistema completo de growth encima de estas.'"},

{bl:"Ciclos",st:"modified",
 nv:{n:"38",t:"Capability Development Framework",i:"imgs/n47.jpg",
   propuesta:"Círculo de 8 pasos: Definir el problema / Contratar un experto / Conseguir mentora / Consultar expertos / Estudiar / Aprender con IA / Desarrollar el mindset / → Nueva capability.",
   script:"'La primera herramienta es el Capability Development Framework. El sistema de ocho pasos para construir cualquier capability que hoy no tienen.'\n\n'El error más común cuando un founder se enfrenta a algo que no sabe hacer es paralizarse. «No sé de ventas.» «No sé de tecnología.» Ese no saber no es un estado permanente. Es el punto de partida de un proceso.'\n\n[Lee los 8 pasos:]\n\n'Primero: definir el problema con precisión. No «no sé de ventas» — sino «no sé cómo estructurar un proceso de ventas outbound para enterprise en Brasil.»'\n\n'Segundo y tercero: antes de estudiar solo — contraten a alguien que ya lo haya resuelto.'\n\n'Cuarto: consultar tres a cinco expertos de talla mundial. Los patrones que aparecen en múltiples conversaciones son los que valen.'\n\n'Quinto y sexto: estudiar por su cuenta y usar IA como acelerador.'\n\n'Séptimo: desarrollar el mindset necesario. Porque algunas capabilities requieren desbloquear una creencia que las bloqueaba.'\n\n'Y el resultado: una nueva capability que antes no existía en su empresa.'"},
 og:{n:"33",t:"Framework 8 pasos (bloque Capabilities)",d:"Mismo contenido, desconectado del flujo.",i:"imgs/o30.jpg"}},

{bl:"Ciclos",st:"modified",
 nv:{n:"39",t:"No mentiras",i:"imgs/n48.jpg",
   propuesta:"La diferencia entre narrativa cómoda ('No crecemos porque llovió') y explicación real con datos.",
   script:"'La segunda herramienta — y la que más me costó aprender — es lo que llamo el principio de no mentiras.'\n\n'En Rappi teníamos una situación recurrente: alguien presentaba un problema con una explicación simple, externa y tranquilizadora. «No crecemos porque ha estado lloviendo.»'\n\n[Pausa.]\n\n'El problema con esas explicaciones no es que sean falsas. El problema es que son narrativas cómodas que reemplazan el análisis real. Y cuando la narrativa cómoda se acepta — el problema subyacente no se resuelve. Se tapa.'\n\n'La regla que implementamos fue simple: si no hay datos que soporten la explicación — es una narrativa cómoda hasta que se demuestre lo contrario.'\n\n'Eso es incómodo. Genera tensión. Pero es exactamente esa tensión la que produce ciclos de aprendizaje reales.'"},
 og:{n:"63",t:"No mentiras (en bloque El Operador)",d:"Igual contenido, fuera del contexto de ciclos.",i:"imgs/o31.jpg"}},

{bl:"Ciclos",st:"modified",

   propuesta:"Planificación → Construcción → Lanzamiento → Operar y Mejorar. Con nota: 'La tasa de mejora es infinitamente mejor con ciclos ultrarrápidos.'",
   script:"'El marco que usamos para cualquier proyecto tiene cuatro fases.'\n\n'Planificación: definir el problema y los requisitos con precisión.'\n\n'Construcción: desarrollo iterativo. No construyen para siempre — construyen para aprender.'\n\n'Lanzamiento: primero local, con posibilidad de reversión, con pruebas A/B.'\n\n'Operar y Mejorar: la fase que nunca termina. Definir nuevos problemas, mejorar las métricas, iterar.'\n\n[Pausa.]\n\n'La clave de este marco es la velocidad entre ciclos. La empresa que completa este loop más rápido que su competencia — aprende más rápido. En el mundo actual, la ventaja competitiva sostenible no es el producto. Es la velocidad de aprendizaje.'\n\n'Dylan va a construir encima de esto todo el sistema de growth. Yo le cedo la palabra.'"},

var cur=0;
var BL=[...new Set(SL.map(function(s){return s.bl;}))];
var propOpen=true, scrOpen=true;

function lbl(st){
  if(st==='same') return ['Sin cambios','bs'];
  if(st==='modified') return ['Modificado','bm'];
  if(st==='new') return ['Nuevo','bn'];
  return ['Eliminado','bs'];
}
function g(id){return document.getElementById(id);}

function setImgH(){
  var h = scriptVisible ? Math.floor(window.innerHeight*0.38) : Math.floor(window.innerHeight*0.72);
  document.querySelectorAll('.iw').forEach(function(el){el.style.height=h+'px';});
}

function render(){
  var s=SL[cur], l=lbl(s.st);
  g('ctr').textContent=(cur+1)+' / '+SL.length;
  g('pill').textContent=s.bl;
  g('bdg').textContent=l[0]; g('bdg').className='bdg '+l[1];
  g('pf').style.width=((cur+1)/SL.length*100)+'%';
  g('bP').disabled=(cur===0); g('bN').disabled=(cur===SL.length-1);

  var bh='';
  for(var i=0;i<BL.length;i++){
    bh+='<button class="bb'+(BL[i]===s.bl?' on':'')+'" onclick="jb('+i+')">'+BL[i]+'</button>';
  }
  g('bks').innerHTML=bh;

  // ORIGINAL
  if(s.og){
    g('oN').textContent='Slide '+s.og.n;
    g('oI').innerHTML=(s.og.i?'<img src="'+s.og.i+'" alt=""><div class="zoom-hint">&#128269; click para ampliar</div>':'<div class="emp-img">Imagen no disponible</div>');
    g('oScroll').innerHTML='<div class="ot">'+s.og.t+'</div><div class="od">'+s.og.d+'</div>';
  } else {
    g('oN').textContent='';
    g('oI').innerHTML='<div class="emp-img">No existe en la presentación original.<br>Este slide es completamente nuevo.</div>';
    g('oScroll').innerHTML='';
  }

  // NUEVA
  g('nN').textContent='Slide '+s.nv.n;
  g('nI').innerHTML='<img src="'+s.nv.i+'" alt=""><div class="zoom-hint">&#128269; click para ampliar</div>';

  var propH = propOpen ? '500px' : '0px';
  var scrH  = scrOpen  ? '1000px': '0px';
  var propLbl = propOpen ? '▲' : '▼';
  var scrLbl  = scrOpen  ? '▲' : '▼';
  var scrFormatted = s.nv.script.replace(/\n/g,'<br>');

  g('nScroll').innerHTML=
    '<div class="nt">'+s.nv.t+'</div>'+
    '<div class="sec">'+
      '<div class="sec-hdr" onclick="togSec(\'prop\')">'+
        '<span class="sec-lbl">¿Qué propongo?</span>'+
        '<span class="tog" id="tProp">'+propLbl+'</span>'+
      '</div>'+
      '<div class="sec-body" id="bProp" style="max-height:'+propH+'">'+
        '<div class="propuesta-box"><div class="propuesta-text">'+s.nv.propuesta+'</div></div>'+
      '</div>'+
    '</div>'+
    (scriptVisible ?
      '<div class="sec">'+
        '<div class="sec-hdr" onclick="togSec(\'scr\')">'+
          '<span class="sec-lbl green">El script</span>'+
          '<span class="tog" id="tScr2">'+scrLbl+'</span>'+
        '</div>'+
        '<div class="sec-body" id="bScr" style="max-height:'+scrH+'">'+
          '<div class="script-box"><div class="script-text">'+scrFormatted+'</div></div>'+
        '</div>'+
      '</div>'
    : '');

  setImgH();
}

function togSec(which){
  if(which==='prop'){
    propOpen=!propOpen;
    var el=g('bProp');
    if(el) el.style.maxHeight = propOpen ? '500px' : '0px';
    var tg=g('tProp');
    if(tg) tg.textContent = propOpen ? '▲' : '▼';
  } else {
    scrOpen=!scrOpen;
    var el2=g('bScr');
    if(el2) el2.style.maxHeight = scrOpen ? '1000px' : '0px';
    var tg2=g('tScr2');
    if(tg2) tg2.textContent = scrOpen ? '▲' : '▼';
  }
}

function toggleScript(){
  scriptVisible=!scriptVisible;
  var btn=g('tScr');
  btn.textContent = scriptVisible ? '📄 Ocultar script' : '📄 Mostrar script';
  btn.className = scriptVisible ? 'tbtn on' : 'tbtn';
  render();
}

function go(d){cur=Math.max(0,Math.min(SL.length-1,cur+d));render();}
function jb(i){cur=SL.findIndex(function(s){return s.bl===BL[i];});render();}

function openModal(side){
  modalSide=side;
  var s=SL[cur];
  var src=side==='orig'?(s.og&&s.og.i?s.og.i:''):s.nv.i;
  if(!src) return;
  g('modalImg').src=src;
  g('modal').classList.add('open');
  g('mPrev').style.display=cur>0?'':'none';
  g('mNext').style.display=cur<SL.length-1?'':'none';
}
function closeModal(){g('modal').classList.remove('open');}
function modalNav(d){
  go(d);
  var s=SL[cur];
  var src=modalSide==='orig'?(s.og&&s.og.i?s.og.i:''):s.nv.i;
  g('modalImg').src=src||'';
  g('mPrev').style.display=cur>0?'':'none';
  g('mNext').style.display=cur<SL.length-1?'':'none';
}
document.addEventListener('keydown',function(e){
  if(e.key==='Escape') closeModal();
  if(e.key==='ArrowLeft'&&!g('modal').classList.contains('open')) go(-1);
  if(e.key==='ArrowRight'&&!g('modal').classList.contains('open')) go(1);
});
window.addEventListener('resize',setImgH);

toggleScript(); // start with script visible and button labeled correctly
render();
</script>
